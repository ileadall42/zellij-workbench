name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: zw-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: zw-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: zw-macos-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} --bin zw
      - run: cp target/${{ matrix.target }}/release/zw ${{ matrix.asset }}
      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset }}
